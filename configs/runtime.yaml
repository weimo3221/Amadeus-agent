agent:
  # Maximum number of tool-producing model iterations in one user turn.
  # Hermes uses a high max_iterations/max_turns budget for its agent loop;
  # Amadeus keeps the same bounded-loop principle for local runtime safety.
  # Env override: AMADEUS_AGENT_MAX_TOOL_ITERATIONS.
  maxToolIterations: 90

context:
  # Estimated maximum context budget before a provider call.
  # This is tokenizer-free and intentionally conservative; env override:
  # AMADEUS_CONTEXT_MAX_TOKENS.
  maxTokens: 24000

  # Trigger summary compaction when estimated context tokens exceed
  # maxTokens * compactionTriggerRatio. Lower values compact earlier.
  compactionTriggerRatio: 0.85

  # Fraction of the compaction trigger budget reserved for recent raw messages
  # after budget-driven compaction. With the defaults this keeps roughly
  # maxTokens * compactionTriggerRatio * 0.20 as raw tail context.
  # Lower values keep fewer recent turn messages and rely more on summaries.
  recentMessageTargetRatio: 0.20

  # Context assembler budgets for API-call-time memory injection.
  # These limits control what is injected into the temporary model request,
  # not what is stored in durable memory.
  summaryChars: 4000
  memoryItemLimit: 8
  memoryItemChars: 500
  retrievalLimit: 3
  retrievalSnippetChars: 280
  taskLimit: 5
  recentTaskLimit: 3
  taskResultChars: 280

  # Number of recent memory.context.used diagnostics retained per session.
  # This is an in-memory developer diagnostic buffer, not durable memory.
  diagnosticsLimit: 20

summary:
  # Run automatic summary compaction after this many stored messages, unless
  # context budget pressure triggers compaction earlier.
  triggerMessageCount: 40

  # Default number of latest user/assistant conversation turns to keep outside
  # the summary. Tool messages attached to those turns are kept with them.
  keepRecentTurns: 3

  # Lower bound for recent user/assistant conversation turns kept during
  # budget-driven compaction.
  # The runtime caps this floor internally so a large tool result cannot force
  # an oversized tail. Set to 0 only if fully summary-first behavior is acceptable.
  minKeepRecentTurns: 1

  # Maximum older messages sent to the provider when generating one summary.
  sourceMaxMessages: 120

  # Cooldown after a summary-generation failure, in seconds.
  failureCooldownSeconds: 300

memoryReview:
  # Automatic memory review starts after this many session messages, subject to
  # cooldown and no-new-message gates. Manual review ignores this threshold.
  triggerMessageCount: 12

  # Recent messages included as evidence for proposing memory candidates.
  sourceMaxMessages: 40

  # Existing durable memory facts included so the reviewer can avoid duplicates.
  existingMemoryLimit: 40

  # Pending candidates included so the reviewer can avoid proposing duplicates.
  pendingLimit: 40

  # Maximum proposed candidates saved into the human review queue per run.
  maxCandidates: 8

  # Cooldown after a successful automatic review, in seconds.
  successCooldownSeconds: 600

  # Cooldown after a failed automatic review, in seconds.
  failureCooldownSeconds: 300

desktop:
  # Companion Live2D model fit multiplier. Increase to make the model larger;
  # decrease to leave more transparent desktop space around the model.
  companionLive2dScale: 0.92

  # Pixel offsets applied after centering the model inside the companion window.
  companionLive2dOffsetX: 0
  companionLive2dOffsetY: 0
