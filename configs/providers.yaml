llm:
  default: deepseek
  providers:
    deepseek:
      label: DeepSeek
      envVar: DEEPSEEK_API_KEY
      baseUrl: https://api.deepseek.com/v1
      apiKey: ${DEEPSEEK_API_KEY}
      model: deepseek-chat
      streaming: true

tts:
  default: auto
  providers:
    auto:
      type: auto
    disabled:
      type: none
    macos_say:
      type: macos_say
      voice: ${MACOS_SAY_VOICE}
      rate: ${MACOS_SAY_RATE}
      timeoutSeconds: 30
    gpt_sovits:
      type: gpt_sovits
      baseUrl: ${GPT_SOVITS_BASE_URL}
      endpoint: /tts
      textLang: ${GPT_SOVITS_TEXT_LANG}
      promptLang: ${GPT_SOVITS_PROMPT_LANG}
      promptText: ${GPT_SOVITS_PROMPT_TEXT}
      refAudioPath: ${GPT_SOVITS_REF_AUDIO_PATH}
      timeoutSeconds: 60
      streamingMode: false

asr:
  default: auto
  providers:
    auto:
      type: auto
    disabled:
      type: none
    faster_whisper:
      type: faster_whisper
      modelSize: ${FASTER_WHISPER_MODEL_SIZE}
      device: ${FASTER_WHISPER_DEVICE}
      computeType: ${FASTER_WHISPER_COMPUTE_TYPE}
      language: ${FASTER_WHISPER_LANGUAGE}
      beamSize: ${FASTER_WHISPER_BEAM_SIZE}
      downloadRoot: ${FASTER_WHISPER_DOWNLOAD_ROOT}
