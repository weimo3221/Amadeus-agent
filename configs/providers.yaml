llm:
  default: openai_compatible
  providers:
    openai_compatible:
      baseUrl: ${OPENAI_BASE_URL}
      apiKey: ${OPENAI_API_KEY}
      model: ${OPENAI_MODEL}
      streaming: true

tts:
  default: auto
  providers:
    auto:
      type: auto
    disabled:
      type: none
    macos_say:
      type: macos_say
      voice: ${MACOS_SAY_VOICE}
      rate: ${MACOS_SAY_RATE}
      timeoutSeconds: 30
    gpt_sovits:
      type: gpt_sovits
      baseUrl: ${GPT_SOVITS_BASE_URL}
      endpoint: /tts
      textLang: ${GPT_SOVITS_TEXT_LANG}
      promptLang: ${GPT_SOVITS_PROMPT_LANG}
      promptText: ${GPT_SOVITS_PROMPT_TEXT}
      refAudioPath: ${GPT_SOVITS_REF_AUDIO_PATH}
      timeoutSeconds: 60
      streamingMode: false

asr:
  default: disabled
  providers:
    disabled:
      type: none
